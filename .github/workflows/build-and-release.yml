name: Build & release
on:
  push:
    tags:
      - 'v*'
jobs:
  release:
    name: Build, attest & release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: go build darwin/arm64
        run: .github/scripts/go-build
        env:
          GOOS: darwin
          GOARCH: arm64
      - name: go build linux/amd64
        run: .github/scripts/go-build
        env:
          GOOS: linux
          GOARCH: amd64
      - name: Generate signed build provenance attestations
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: 'templatefile-${{ github.ref_name }}-*.tar.xz'
      - name: Create release
        run: .github/scripts/create-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  no-more-jobs:
    name: No more jobs
    runs-on: ubuntu-24.04
    needs:
      - release
    steps:
      - name: 😴
        run: printf '%s\n' 'No more jobs!'

name: Build & release
on:
  push:
    tags:
      - 'v*'
jobs:
  release:
    name: Build, attest & release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Go
        run: .github/scripts/install-go
      - name: go build darwin/arm64
        run: .github/scripts/go-build
        env:
          GOOS: darwin
          GOARCH: arm64
      - name: go build linux/amd64
        run: .github/scripts/go-build
        env:
          GOOS: linux
          GOARCH: amd64
      - name: Generate signed build provenance attestations
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'templatefile-${{ github.ref_name }}-*.tar.xz'
      - name: Create release
        run: .github/scripts/create-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  no-more-jobs:
    name: No more jobs
    runs-on: ubuntu-24.04
    needs:
      - release
    steps:
      - name: 😴
        run: printf '%s\n' 'No more jobs!'

name: Test
on:
  push:
    branches-ignore:
      - main
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-24.04
    permissions:
      contents: read # Required to clone the repo
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: govulncheck
        run: |
          go tool govulncheck ./...
  pinact-verify:
    name: Verify GitHub Actions versions
    runs-on: ubuntu-24.04
    permissions:
      contents: read # Required to clone the repo
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: pinact run --verify
        run: |
          go tool pinact run --verify .github/workflows/*.yml
  fmt-test:
    name: fmt and test
    runs-on: ubuntu-24.04
    permissions:
      contents: read # Required to clone the repo
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: go fmt
        run: |
          test -z "$(go fmt)"
      - name: go test
        run: |
          go test
  fuzz:
    name: 10s fuzz test
    runs-on: ubuntu-24.04
    continue-on-error: true
    permissions:
      contents: read # Required to clone the repo
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: go fuzz
        run: |
          go test -fuzz=FuzzTemplatefile -fuzztime=10s
      - name: Collect any new fuzz corpora
        id: corpus
        if: failure()
        run: |
          {
            printf '%s\n' 'paths<<EOF'
            git ls-files --others --exclude-standard -- testdata/fuzz/
            printf '%s\n' 'EOF'
          } >> "$GITHUB_OUTPUT"
      - name: Upload fuzz failure corpora
        if: failure() && steps.corpus.outputs.paths != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-failure-corpus
          path: ${{ steps.corpus.outputs.paths }}
          retention-days: 14
  no-more-jobs:
    name: No more jobs
    runs-on: ubuntu-24.04
    needs:
      - govulncheck
      - pinact-verify
      - fmt-test
      - fuzz
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
      - name: 😴
        run: printf '%s\n' 'No more jobs!'
